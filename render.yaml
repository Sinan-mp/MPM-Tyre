services:
  - type: web
    name: mpm-tyres-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.21.1
      - key: FRONTEND_ORIGIN
        value: https://sinan-mp.github.io
      - key: MONGO_URI
        sync: false
