<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPM Tyres</title>
  <link rel="stylesheet" href="site-layout.css">
  <link rel="stylesheet" href="Other services.css">
  <style>
    .other-search-wrap {
      max-width: 560px;
      margin: 16px auto 26px;
      padding: 0 12px;
    }

    .other-search-input {
      width: 100%;
      height: 46px;
      border: 1px solid #cfd8e3;
      border-radius: 9px;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
    }

    .other-search-input:focus {
      border-color: #2985ff;
      box-shadow: 0 0 0 3px rgba(41, 133, 255, 0.18);
    }

    .other-search-empty {
      display: none;
      margin: 10px 0 0;
      color: #a32626;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <center>
    <h3>Other Services</h3>
  </center>
  <div class="other-search-wrap">
    <input
      type="search"
      id="otherSearchInput"
      class="other-search-input"
      placeholder="Search service (e.g. Battery, Chain, Liner)"
      aria-label="Search other services"
    >
    <p id="otherSearchEmpty" class="other-search-empty">No matching service found.</p>
  </div>
  <section>
    <div class="container">
      <div class="row" id="otherServiceGrid">
        <div class="col-full header">

        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Liner.jpeg" class="card-img-top" alt="Liner image">
            <div class="card-body">
              <h5 class="card-title">Liner changing </h5>
              
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Seat cover.webp" class="card-img-top" alt="Seat cover image">
            <div class="card-body">
              <h5 class="card-title">Seat cover</h5>
           
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Tank cover.jpg" class="card-img-top" alt="Tank cover image">
            <div class="card-body">
              <h5 class="card-title">Tank cover</h5>
             
          
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Chain.jpeg" class="card-img-top" alt="Chain image">
            <div class="card-body">
              <h5 class="card-title">Chain</h5>
             
              
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Battery.jpg" class="card-img-top" alt="Battery image">
            <div class="card-body">
              <h5 class="card-title">Battery</h5>
             
              
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Rim elly fitting.jpeg" class="card-img-top" alt="Bike Rim image">
            <div class="card-body">
              <h5 class="card-title">Bike rim</h5>
            
              
            </div>
          </div>
        </div>



        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Battery charging.jpg" class="card-img-top" alt="Battery charging image">
            <div class="card-body">
              <h5 class="card-title">Battery charging</h5>
            
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Battery water.jpg" class="card-img-top" alt="Battery water image">
            <div class="card-body">
              <h5 class="card-title">Battery Water</h5>
              
            </div>
          </div>
        </div>
        <div class="col-third col-half-xs header other-service-item">
          <div class="card" style="width: 18rem;">
            <img src="images/Other services images/Battery charging.jpg" class="card-img-top" alt="Bike Rim image">
            <div class="card-body">
              <h5 class="card-title">Battery Charging</h5>
            
            </div>
          </div>
        </div>

















      </div>
    </div>
  </section>

  <script src="site-ui.js"></script>
  <script>
    (function () {
      var input = document.getElementById("otherSearchInput");
      var emptyState = document.getElementById("otherSearchEmpty");
      var cards = Array.prototype.slice.call(
        document.querySelectorAll("#otherServiceGrid .other-service-item")
      );

      function normalize(text) {
        return text.toLowerCase().replace(/\s+/g, " ").trim();
      }

      function filterServices(query) {
        var q = normalize(query);
        var visibleCount = 0;

        cards.forEach(function (item) {
          var titleEl = item.querySelector(".card-title");
          var title = titleEl ? normalize(titleEl.textContent) : "";
          var isMatch = !q || title.indexOf(q) !== -1;
          item.style.display = isMatch ? "" : "none";
          if (isMatch) {
            visibleCount += 1;
          }
        });

        if (!q) {
          emptyState.style.display = "none";
          return;
        }

        emptyState.style.display = visibleCount ? "none" : "block";
      }

      input.addEventListener("input", function () {
        filterServices(input.value);
      });
    })();
  </script>
</body>

</html>
