  <script src="site-ui.js"></script>
  <script>
    (function () {
      var input = document.getElementById("cycleSearchInput");
      var emptyState = document.getElementById("cycleSearchEmpty");
      var cards = Array.prototype.slice.call(document.querySelectorAll("#cycleProductGrid .product-item"));

      function normalize(text) {
        return text.toLowerCase().replace(/\s+/g, " ").trim();
      }

      function filterProducts(query) {
        var q = normalize(query);
        var visibleCount = 0;

        cards.forEach(function (item) {
          var titleEl = item.querySelector(".card-title");
          var title = titleEl ? normalize(titleEl.textContent) : "";
          var isMatch = !q || title.indexOf(q) !== -1;
          item.style.display = isMatch ? "" : "none";
          if (isMatch) {
            visibleCount += 1;
          }
        });

        if (!q) {
          emptyState.style.display = "none";
          return;
        }

        emptyState.style.display = visibleCount ? "none" : "block";
      }

      input.addEventListener("input", function () {
        filterProducts(input.value);
      });
    })();
  </script>
