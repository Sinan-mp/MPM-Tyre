<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MPM Tyres | Bike Tyres</title>
  <link rel="stylesheet" href="../site-layout.css">
  <style>
    .Tyrelogo {
      height: 100px;
      width: 250px;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <section>
    <div class="container">
      <div class="row">
        <div class="col-full header">
          <h2>Top new tyre brands available at MPM TYRES</h2>
        </div>

        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Ceat.png" alt="Ceat tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Apollo.jpg" alt="Apollo tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Mrf.png" alt="MRF tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Tvs.jpg" alt="TVS tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Tolins.png" alt="Tolins tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Jk.png" alt="JK tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Bridgestone.png" alt="Bridgestone tyre logo"></div>
        <div class="col-third"><img class="Tyrelogo" src="Tyre brand image/Ralco.png" alt="Ralco tyre logo"></div>
      </div>
    </div>
  </section>

  <script src="../site-ui.js"></script>
